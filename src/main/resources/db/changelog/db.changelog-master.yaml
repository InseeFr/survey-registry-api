databaseChangeLog:

  - changeSet:
      id: 2
      author: rverriez
      changes:
        - createTable:
            tableName: external_link
            columns:
              - column:
                  name: id
                  type: varchar
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: version
                  type: varchar
                  constraints:
                    nullable: false

  - changeSet:
      id: 1
      author: rverriez
      changes:
        - createTable:
            tableName: codes_list
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: label
                  type: varchar
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: varchar
                  constraints:
                    nullable: false
              - column:
                  name: external_link_id
                  type: varchar
                  constraints:
                    nullable: true
              - column:
                  name: search_config
                  type: jsonb
              - column:
                  name: content
                  type: jsonb
        - addForeignKeyConstraint:
            baseTableName: codes_list
            baseColumnNames: external_link_id
            referencedTableName: external_link
            referencedColumnNames: id
            constraintName: fk_codes_list_external_link

  - changeSet:
      id: 4
      author: rverriez
      changes:
        - dropColumn:
            tableName: codes_list
            columnName: version
        - addColumn:
            tableName: codes_list
            columns:
              - column:
                  name: version
                  type: integer
                  constraints:
                    nullable: false

  - changeSet:
      id: 3
      author: rverriez
      changes:
        - addColumn:
            tableName: codes_list
            columns:
              - column:
                  name: theme
                  type: varchar(49)
                  constraints:
                    nullable: false
              - column:
                  name: reference_year
                  type: varchar(4)
                  constraints:
                    nullable: true

  - changeSet:
      id: 5
      author: rverriez
      changes:
        - addUniqueConstraint:
            tableName: codes_list
            columnNames: theme, reference_year, version
            constraintName: uq_codeslist_theme_referenceyear_version

  - changeSet:
      id: 6
      author: rverriez
      changes:
        - modifyDataType:
             tableName: codes_list
             columnName: reference_year
             newDataType: varchar(4)
        - addNotNullConstraint:
             tableName: codes_list
             columnName: reference_year
             columnDataType: varchar(4)

  - changeSet:
      id: 7
      author: rverriez
      changes:
        - addColumn:
            tableName: codes_list
            columns:
              - column:
                  name: is_deprecated
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

  - changeSet:
      id: 8
      author: rverriez
      changes:
        - addColumn:
            tableName: codes_list
            columns:
              - column:
                  name: is_valid
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false

  - changeSet:
      id: 9
      author: rverriez
      changes:
        - createIndex:
            indexName: idx_codes_list_theme_referenceyear
            tableName: codes_list
            columns:
              - column:
                  name: theme
              - column:
                  name: reference_year

        - createIndex:
            indexName: idx_codes_list_id_where_content_not_null
            tableName: codes_list
            columns:
              - column:
                  name: id
            where: "content IS NOT NULL"

        - createIndex:
            indexName: idx_codes_list_id_where_search_config_not_null
            tableName: codes_list
            columns:
              - column:
                  name: id
            where: "search_config IS NOT NULL"

  - changeSet:
      id: 10
      author: rverriez
      changes:

        - createTable:
            tableName: conceptual_model
            columns:
              - column:
                  name: pogues_version_id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: label
                  type: varchar
                  constraints:
                    nullable: false

        - createTable:
            tableName: instrument_collection
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: conceptual_model_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: mode
                  type: varchar
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: varchar
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: text
                  constraints:
                    nullable: true

        - addForeignKeyConstraint:
            baseTableName: instrument_collection
            baseColumnNames: conceptual_model_id
            referencedTableName: conceptual_model
            referencedColumnNames: pogues_version_id
            constraintName: fk_instrument_collection_conceptual_model

        - sql:
            sql: >
              ALTER TABLE instrument_collection
              ADD CONSTRAINT chk_instrument_mode
              CHECK (mode IN ('CAWI','CATI','CAPI','PAPI'));

        - createIndex:
            indexName: idx_instrument_collection_conceptual_model
            tableName: instrument_collection
            columns:
              - column:
                  name: conceptual_model_id

  - changeSet:
      id: 11
      author: rverriez
      changes:
        - sql:
            sql: >
              ALTER TABLE instrument_collection
              ADD CONSTRAINT chk_instrument_type
              CHECK (type IN ('JSON','XML','BINARY'));

  - changeSet:
      id: 12
      author: rverriez
      changes:

        - renameTable:
            oldTableName: instrument_collection
            newTableName: collection_instrument

        - renameColumn:
            tableName: collection_instrument
            oldColumnName: id
            newColumnName: collection_instrument_id
            columnDataType: uuid

  - changeSet:
      id: 13
      author: rverriez
      changes:
        - dropForeignKeyConstraint:
            baseTableName: codes_list
            constraintName: fk_codes_list_external_link

        - dropColumn:
            tableName: codes_list
            columnName: external_link_id

        - dropTable:
            tableName: external_link

  - changeSet:
      id: 14
      author: crenaud
      changes:
        - addColumn:
            tableName: codes_list
            columns:
              - column:
                  name: urn
                  type: varchar
                  constraints:
                    nullable: true
